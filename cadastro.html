
<html>

<head>
    <link rel="stylesheet" href="all.css">
   
    <title>Cadastro | SoundHeaven💿</title>
    
    <link rel="icon" type="image/png" href="./Imagem/logo.PNG">
       <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Palette+Mosaic&display=swap" rel="stylesheet">

</head>

<body>

    <main>
        <!--Caixa do cadastro-->
        <section class="cadbox">
            <div class="pfpcad">
                <img src="./Imagem/perfil.png" class="perfil">
            </div>

            <!--Formulário-->
            <form>
                <div class="formcad">
                    <input type="text" placeholder="Nome Completo">
                    <input type="email" placeholder="E-mail">
                    <input type="number" placeholder="Telefone">
                    <input type="password" placeholder="Senha">
                    <input type="password" placeholder="Confirme sua senha">
                </div>
            </form>

            <!--Botão de cadastro-->
            <div class="buttoncad">
                <button type="submit"><a href="home.html">Cadastre-se</a></button>
            </div>
        </section>
        
    </main>
</body>

</html>
